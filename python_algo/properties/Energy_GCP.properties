# GCP energy model settings for python_algo/src/cspPlacement.py
#
# Node model:
#   P_node(h) = gcp.pue * [gcp.p_vcpu_idle_w * cpu_cap[h]
#                         + (gcp.p_vcpu_active_w - gcp.p_vcpu_idle_w) * cpu_used[h]]
#
# Link model:
#   E_link(edge) = flow_bw * latency_ms * factor(latency tier)
#   tier factors selected by latency thresholds below.

# Google Cloud PUE (uniform)
gcp.pue=1.10

# Power per vCPU slot (Watts)
gcp.p_vcpu_idle_w=1.0
gcp.p_vcpu_active_w=8.0

# Latency thresholds (ms) for link type inference
gcp.lat.intrazone_ms=2.0
gcp.lat.interzone_ms=25.0

# Energy factors by inferred link type
gcp.factor.intrazone=1.0
gcp.factor.interzone=1.5
gcp.factor.crossregion=2.0

# Integer scaling used inside CP-SAT (10 = deci-W)
gcp.energy_scale=10
